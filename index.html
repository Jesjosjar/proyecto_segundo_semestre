<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Laboratorios</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>

<body>

    <h1>Sistema de Laboratorios</h1>

    <!-- Formulario Laboratorios -->
    <div class="section">
        <h2>Nuevo/Editar Laboratorio</h2>
        <input type="hidden" id="labId">
        <input type="text" id="labTitulo" placeholder="Título del Lab">
        <input type="text" id="labDesc" placeholder="Descripción">
        <input type="text" id="labUbic" placeholder="Ubicación">
        <button onclick="guardarLab()">Guardar Laboratorio</button>
    </div>

    <!-- Listado -->
    <div id="labsContainer"></div>

    <!-- Reporte y Estadísticas -->
    <div class="section">
        <h2>Reporte General y Estadísticas</h2>
        <div id="stats"></div>
        <table id="reportTable">
            <thead>
                <tr>
                    <th>Lab</th>
                    <th>Equipo</th>
                    <th>Componentes</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <br>
        <button onclick="downloadReport()" style="background: #007bff;">Descargar Reporte (CSV)</button>
    </div>
</body>

</html>
