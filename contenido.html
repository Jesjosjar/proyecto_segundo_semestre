<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Laboratorios</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>

<body>

    <h1>Sistema de Laboratorios <button class="button"
            onclick="document.getElementById('dialog_reporte').showModal();">Ver Reporte</button></h1>

    <div class="section">
        <h2>Nuevo/Editar Laboratorio</h2>
        <input type="hidden" id="labId">
        <input type="text" id="labTitulo" placeholder="Título del Lab">
        <input type="text" id="labDesc" placeholder="Descripción">
        <input type="text" id="labUbic" placeholder="Ubicación">
        <button onclick="guardarLab()">Guardar Laboratorio</button>
    </div>

    <div id="labsContainer" class="section">
        <ul id="ul_laboratorios">

        </ul>
    </div>

    <dialog id="dialog_reporte">
        <div>
            <h2 class="titulo_reporte">Reporte General</h2>
            <div>
                <h3>Resumen</h3>
                <p>
                    Total de Laboratorios: <span id="span_TotalLaboratoriosReporte"></span> <br>
                    Total de Equipo: <span id="span_TotalEquiposReporte"></span>
                </p>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Laboratorio</th>
                        <th>Equipo</th>
                        <th>Componentes</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tbody_reporte">

                </tbody>
            </table>
        </div>
        <div id="buttons_report" class="titulo_reporte">
            <button class="btn_bottom_left" onclick="downloadReport()" >Descargar Reporte (CSV)</button>
            <button class="btn_bottom_right" onclick="document.getElementById('dialog_reporte').close();">Cerrar</button>
        </div>

    </dialog>
</body>

</html>
